<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jenny's Salon</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#c9996a;--g2:#e8c99a;--g3:#f5e6d0;
  --pk:#FBEAF0;--pk2:#F4C0D1;--pk3:#ED93B1;--pk4:#D4537E;--pk5:#993556;--pk6:#72243E;--pk7:#4B1528;
  --cream:#fffaf7;--ivory:#fff8f2;--wa:#25D366;
}
body{font-family:'Georgia',serif;background:var(--cream);color:var(--pk6);}
/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;background:white;border-bottom:1px solid var(--pk2);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:22px;color:var(--pk6);letter-spacing:3px;font-style:italic;}
.nav-links{display:flex;gap:16px;align-items:center;}
.nav-link{font-size:11px;color:var(--pk5);letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:none;font-family:inherit;}
.nav-wa{display:flex;align-items:center;gap:6px;background:var(--wa);color:white;border:none;padding:8px 14px;border-radius:30px;font-size:11px;font-family:inherit;letter-spacing:1px;cursor:pointer;}
.nav-wa svg{width:14px;height:14px;fill:white;}
.nav-cta{background:var(--pk4);color:white;border:none;padding:8px 18px;border-radius:30px;font-size:11px;font-family:inherit;letter-spacing:1px;cursor:pointer;margin-left:4px;}
/* HERO */
.hero{background:var(--ivory);padding:70px 40px 60px;text-align:center;border-bottom:1px solid var(--pk2);}
.hero-ornament{font-size:10px;letter-spacing:6px;color:var(--g);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:12px;}
.hero-ornament::before,.hero-ornament::after{content:'';flex:1;max-width:60px;height:1px;background:var(--g2);}
.salon-name{font-size:52px;font-weight:400;color:var(--pk6);letter-spacing:6px;margin-bottom:4px;font-style:italic;line-height:1.1;}
.salon-name span{color:var(--g);font-style:normal;font-size:36px;display:block;letter-spacing:10px;margin-top:4px;}
.salon-tagline{font-size:10px;color:var(--pk4);letter-spacing:4px;text-transform:uppercase;margin-bottom:36px;}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-gold{background:var(--g);color:white;border:none;padding:13px 28px;font-size:11px;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;}
.btn-outline-gold{background:transparent;color:var(--g);border:1px solid var(--g);padding:13px 28px;font-size:11px;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;}
.btn-wa-hero{display:flex;align-items:center;gap:8px;background:var(--wa);color:white;border:none;padding:13px 24px;font-size:11px;font-family:inherit;cursor:pointer;letter-spacing:2px;text-transform:uppercase;}
.btn-wa-hero svg{width:15px;height:15px;fill:white;}
/* SECTIONS */
.sec{padding:52px 40px;}.sec-alt{background:var(--ivory);}
.sec-head{text-align:center;margin-bottom:36px;}
.sec-label{font-size:10px;letter-spacing:4px;color:var(--g);text-transform:uppercase;margin-bottom:8px;}
.sec-title{font-size:32px;font-weight:400;color:var(--pk6);font-style:italic;margin-bottom:10px;}
.sec-line{width:46px;height:1px;background:var(--g2);margin:0 auto;}
/* SERVICES */
.svc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.svc-card{background:white;border:1px solid var(--pk2);overflow:hidden;transition:transform 0.2s;}
.svc-card:hover{transform:translateY(-3px);}
.svc-img{width:100%;height:180px;object-fit:cover;display:block;}
.svc-body{padding:18px 16px;}
.svc-name{font-size:14px;color:var(--pk6);margin-bottom:4px;letter-spacing:0.5px;}
.svc-desc{font-size:11px;color:var(--pk4);margin-bottom:10px;line-height:1.6;}
.svc-foot{display:flex;align-items:baseline;justify-content:space-between;}
.svc-price{font-size:18px;color:var(--g);font-style:italic;}
.svc-dur{font-size:10px;color:var(--pk4);letter-spacing:1px;}
/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.gal-item{aspect-ratio:3/4;overflow:hidden;position:relative;}
.gal-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s;}
.gal-item:hover img{transform:scale(1.05);}
.gal-label{position:absolute;bottom:0;left:0;right:0;background:rgba(75,21,40,0.78);color:var(--pk2);font-size:10px;letter-spacing:2px;padding:10px;text-align:center;text-transform:uppercase;}
/* BOOKING */
.booking-wrap{max-width:510px;margin:0 auto;}
.booking-box{background:white;border:1px solid var(--pk2);padding:32px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fgrp{margin-bottom:16px;}
.flabel{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--g);margin-bottom:6px;}
.finput{width:100%;padding:10px 13px;border:1px solid var(--pk2);font-size:13px;font-family:inherit;color:var(--pk6);background:var(--ivory);outline:none;transition:border-color 0.2s;}
.finput:focus{border-color:var(--pk4);background:white;}
.submit-btn{width:100%;background:var(--pk5);color:white;border:none;padding:14px;font-size:11px;font-family:inherit;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:4px;}
.wa-book-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:var(--wa);color:white;border:none;padding:14px;font-size:11px;font-family:inherit;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;}
.wa-book-btn svg{width:14px;height:14px;fill:white;}
.or-div{text-align:center;font-size:10px;color:var(--g);letter-spacing:3px;text-transform:uppercase;margin:12px 0 4px;}
/* FOOTER */
.footer{background:var(--pk7);color:var(--pk2);text-align:center;padding:40px 24px;}
.footer-name{font-size:28px;font-style:italic;color:white;letter-spacing:4px;margin-bottom:14px;}
.footer-info{font-size:11px;letter-spacing:2px;line-height:2.2;}
.footer-wa{display:inline-flex;align-items:center;gap:8px;background:var(--wa);color:white;border:none;padding:11px 24px;font-size:11px;font-family:inherit;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:20px;}
.footer-wa svg{width:14px;height:14px;fill:white;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">Jenny's</div>
  <div class="nav-links">
    <button class="nav-link" onclick="goTo('sec-services')">Services</button>
    <button class="nav-link" onclick="goTo('sec-gallery')">Gallery</button>
    <button class="nav-link" onclick="goTo('sec-booking')">Book</button>
    <button class="nav-wa" onclick="openWA('Hi! I would like to book an appointment at Jenny\'s Salon.')">
      <svg viewBox="0 0 24 24"><use href="#wa"/></svg>WhatsApp
    </button>
    <button class="nav-cta" onclick="goTo('sec-booking')">Book Now</button>
  </div>
</div>

<div class="hero">
  <div class="hero-ornament">Est. 2024</div>
  <div class="salon-name">Jenny's<span>Salon</span></div>
  <div class="salon-tagline">Manicure &amp; Pedicure · Baltimore, MD</div>
  <div class="hero-btns">
    <button class="btn-gold" onclick="goTo('sec-booking')">Book an Appointment</button>
    <button class="btn-outline-gold" onclick="goTo('sec-services')">Our Services</button>
    <button class="btn-wa-hero" onclick="openWA('Hi! I would like to book an appointment at Jenny\'s Salon.')">
      <svg viewBox="0 0 24 24"><use href="#wa"/></svg>Chat on WhatsApp
    </button>
  </div>
</div>

<!-- SERVICES -->
<div class="sec" id="sec-services">
  <div class="sec-head">
    <div class="sec-label">What We Offer</div>
    <div class="sec-title">Our Services</div>
    <div class="sec-line"></div>
  </div>
  <div class="svc-grid" id="svc-grid"></div>
</div>

<!-- GALLERY -->
<div class="sec sec-alt" id="sec-gallery">
  <div class="sec-head">
    <div class="sec-label">Our Work</div>
    <div class="sec-title">Gallery</div>
    <div class="sec-line"></div>
  </div>
  <div class="gallery-grid" id="gal-grid"></div>
</div>

<!-- BOOKING -->
<div class="sec" id="sec-booking">
  <div class="sec-head">
    <div class="sec-label">Reserve Your Spot</div>
    <div class="sec-title">Book an Appointment</div>
    <div class="sec-line"></div>
  </div>
  <div class="booking-wrap">
    <div class="booking-box">
      <div class="form-row">
        <div class="fgrp"><label class="flabel">Your Name</label><input class="finput" id="c-name" placeholder="Jane Smith" type="text"></div>
        <div class="fgrp"><label class="flabel">Phone</label><input class="finput" id="c-phone" placeholder="+1 (667) 000-0000" type="tel"></div>
      </div>
      <div class="fgrp">
        <label class="flabel">Service</label>
        <select class="finput" id="c-svc">
          <option value="">Select a service...</option>
          <option value="Classic Manicure">Classic Manicure — $25</option>
          <option value="Gel Manicure">Gel Manicure — $40</option>
          <option value="Nail Extensions">Nail Extensions — $60</option>
          <option value="Nail Art">Nail Art — $20+</option>
          <option value="Classic Pedicure">Classic Pedicure — $35</option>
          <option value="Luxury Pedicure">Luxury Pedicure — $55</option>
        </select>
      </div>
      <div class="form-row">
        <div class="fgrp"><label class="flabel">Date</label><input class="finput" id="c-date" type="date"></div>
        <div class="fgrp">
          <label class="flabel">Time</label>
          <select class="finput" id="c-time">
            <option value="">Select time...</option>
            <option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option>
            <option>12:00 PM</option><option>1:00 PM</option><option>2:00 PM</option>
            <option>3:00 PM</option><option>4:00 PM</option><option>5:00 PM</option>
          </select>
        </div>
      </div>
      <div class="fgrp"><label class="flabel">Special Requests</label><textarea class="finput" id="c-note" rows="2" placeholder="Any notes for us..."></textarea></div>
      <button class="submit-btn" onclick="clientBook()">Confirm My Appointment</button>
      <div class="or-div">— or book instantly via —</div>
      <button class="wa-book-btn" onclick="bookViaWA()">
        <svg viewBox="0 0 24 24"><use href="#wa"/></svg>Book via WhatsApp
      </button>
    </div>
  </div>
</div>

<div class="footer">
  <div class="footer-name">Jenny's Salon</div>
  <div class="footer-info">
    Baltimore, MD, United States<br>
    Monday – Friday &nbsp;·&nbsp; 9:00 AM – 6:00 PM<br>
    +1 (667) 448-8012
  </div>
  <button class="footer-wa" onclick="openWA('Hi Jenny! I have a question about the salon.')">
    <svg viewBox="0 0 24 24"><use href="#wa"/></svg>&nbsp; Message Us on WhatsApp
  </button>
</div>

const SVCS=[
  {name:'Classic Manicure',desc:'Shape · Buff · Polish',price:'$25',dur:'45 min',img:IMGS.classic_mani},
  {name:'Gel Manicure',desc:'Long-lasting gel finish',price:'$40',dur:'60 min',img:IMGS.gel},
  {name:'Nail Extensions',desc:'Acrylic or gel tips',price:'$60',dur:'90 min',img:IMGS.extensions},
  {name:'Nail Art',desc:'Custom hand-painted designs',price:'$20+',dur:'30 min+',img:IMGS.nail_art},
  {name:'Classic Pedicure',desc:'Soak · Scrub · Polish',price:'$35',dur:'60 min',img:IMGS.classic_ped},
  {name:'Luxury Pedicure',desc:'Full spa foot treatment',price:'$55',dur:'90 min',img:IMGS.lux_ped},
];
const GAL=[
  {label:'Classic Manicure',img:IMGS.classic_mani},
  {label:'Gel Manicure',img:IMGS.gel},
  {label:'Nail Extensions',img:IMGS.extensions},
  {label:'French Tips',img:IMGS.french},
  {label:'Nail Art',img:IMGS.nail_art},
  {label:'Luxury Spa',img:IMGS.spa},
];
document.getElementById('svc-grid').innerHTML=SVCS.map(s=>`
  <div class="svc-card">
    <img class="svc-img" src="${s.img}" alt="${s.name}">
    <div class="svc-body">
      <div class="svc-name">${s.name}</div>
      <div class="svc-desc">${s.desc}</div>
      <div class="svc-foot"><div class="svc-price">${s.price}</div><div class="svc-dur">${s.dur}</div></div>
    </div>
  </div>`).join('');
document.getElementById('gal-grid').innerHTML=GAL.map(g=>`
  <div class="gal-item">
    <img src="${g.img}" alt="${g.label}">
    <div class="gal-label">${g.label}</div>
  </div>`).join('');
function goTo(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});}
function openWA(msg){window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank');}
function bookViaWA(){
  const n=document.getElementById('c-name').value.trim();
  const s=document.getElementById('c-svc').value;
  const d=document.getElementById('c-date').value;
  const t=document.getElementById('c-time').value;
  let msg="Hi Jenny! I'd like to book an appointment at Jenny's Salon.\n";
  if(n)msg+="Name: "+n+"\n";if(s)msg+="Service: "+s+"\n";
  if(d)msg+="Date: "+d+"\n";if(t)msg+="Time: "+t+"\n";
  openWA(msg);
}
function clientBook(){
  const n=document.getElementById('c-name').value.trim();
  const s=document.getElementById('c-svc').value;
  const d=document.getElementById('c-date').value;
  const t=document.getElementById('c-time').value;
  if(!n||!s||!d||!t){alert('Please fill all required fields.');return;}
  alert('Booking confirmed! We look forward to seeing you.');
  ['c-name','c-phone','c-note'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('c-svc').value='';
  document.getElementById('c-date').value='';
  document.getElementById('c-time').value='';
}
</script>
